<!DOCTYPE html>
<html>
<head>
  <title>Brand Install Mode Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #111;
    }

    header {
      background: #111;
      color: white;
      padding: 16px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .brand {
      font-weight: 800;
      font-size: 20px;
    }

    .hero {
      padding: 55px 30px;
      text-align: center;
      background: linear-gradient(135deg, #fff, #e8e8e8);
    }

    .hero h1 {
      font-size: 42px;
      margin: 0;
    }

    .catalog {
      max-width: 1150px;
      margin: 40px auto;
      padding: 0 30px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px;
    }

    .product {
      background: white;
      border-radius: 20px;
      padding: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    .image-wrap {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      background: #eee;
    }

    .product img {
      width: 100%;
      height: 260px;
      object-fit: cover;
      display: block;
    }

    .tryon-overlay {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 16px;
      border-radius: 999px;
      border: none;
      background: rgba(0,0,0,0.9);
      color: white;
      font-weight: 700;
      cursor: pointer;
      opacity: 0;
      transition: 0.2s;
    }

    .image-wrap:hover .tryon-overlay {
      opacity: 1;
    }

    .product h3 {
      margin: 12px 0 4px;
    }

    .price {
      font-weight: 700;
    }

    .actions {
      margin-top: 10px;
      display: grid;
      gap: 8px;
    }

    button {
      padding: 12px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
    }

    .try-btn {
      background: #111;
      color: white;
    }

    .save-btn {
      background: #eee;
    }
  </style>
</head>

<body>

<header>
  <div class="brand">NOVA STREET</div>
  <div>Cart</div>
</header>

<section class="hero">
  <h1>Try Before You Buy</h1>
</section>

<main class="catalog">

  <!-- Shirt 1 -->
  <div class="product">
    <div class="image-wrap">
      <img src="/shirt1.png">
      <button class="tryon-overlay"
        data-tryon-action="try"
        data-product-name="Black Hoodie"
        data-product-image="/shirt1.png">
        Try On
      </button>
    </div>

    <h3>Black Hoodie</h3>
    <p class="price">$49.99</p>

    <div class="actions">
      <button class="try-btn"
        data-tryon-action="try"
        data-product-name="Black Hoodie"
        data-product-image="/shirt1.png">
        Try It On
      </button>

      <button class="save-btn"
        data-tryon-action="save"
        data-product-name="Black Hoodie"
        data-product-image="/shirt1.png">
        Save for Later
      </button>
    </div>
  </div>

  <!-- Shirt 2 -->
  <div class="product">
    <div class="image-wrap">
      <img src="/shirt2.png">
      <button class="tryon-overlay"
        data-tryon-action="try"
        data-product-name="Graphic Tee"
        data-product-image="/shirt2.png">
        Try On
      </button>
    </div>

    <h3>Graphic Tee</h3>
    <p class="price">$39.99</p>

    <div class="actions">
      <button class="try-btn"
        data-tryon-action="try"
        data-product-name="Graphic Tee"
        data-product-image="/shirt2.png">
        Try It On
      </button>

      <button class="save-btn"
        data-tryon-action="save"
        data-product-name="Graphic Tee"
        data-product-image="/shirt2.png">
        Save for Later
      </button>
    </div>
  </div>

  <!-- Shirt 3 -->
  <div class="product">
    <div class="image-wrap">
      <img src="/shirt3.png">
      <button class="tryon-overlay"
        data-tryon-action="try"
        data-product-name="Zip Hoodie"
        data-product-image="/shirt3.png">
        Try On
      </button>
    </div>

    <h3>Zip Hoodie</h3>
    <p class="price">$69.99</p>

    <div class="actions">
      <button class="try-btn"
        data-tryon-action="try"
        data-product-name="Zip Hoodie"
        data-product-image="/shirt3.png">
        Try It On
      </button>

      <button class="save-btn"
        data-tryon-action="save"
        data-product-name="Zip Hoodie"
        data-product-image="/shirt3.png">
        Save for Later
      </button>
    </div>
  </div>

  <!-- Shirt 4 (WHITE SHIRT) -->
  <div class="product">
    <div class="image-wrap">
      <img src="/shirt4.png">
      <button class="tryon-overlay"
        data-tryon-action="try"
        data-product-name="White Tee"
        data-product-image="/shirt4.png">
        Try On
      </button>
    </div>

    <h3>White Tee</h3>
    <p class="price">$44.99</p>

    <div class="actions">
      <button class="try-btn"
        data-tryon-action="try"
        data-product-name="White Tee"
        data-product-image="/shirt4.png">
        Try It On
      </button>

      <button class="save-btn"
        data-tryon-action="save"
        data-product-name="White Tee"
        data-product-image="/shirt4.png">
        Save for Later
      </button>
    </div>
  </div>

</main>

<script src="/widget.js"
  data-brand-name="NOVA STREET"
  data-widget-title="Virtual Fitting Room"
  data-primary-color="#111"
  data-launcher-text="Try-On Closet">
</script>

</body>
</html>
